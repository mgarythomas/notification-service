openapi: 3.0.3
info:
  title: Notification Service API
  version: 1.0.0
  description: API for the enterprise Notification Service for routing messages across multiple delivery channels.
servers:
  - url: https://api.dmz.example.com/v1
    description: External DMZ API Gateway
  - url: http://internal-api.example.local/v1
    description: Internal API Gateway

paths:
  /notifications:
    post:
      summary: Send a single notification
      description: Submit a single notification request specifying channel, destination, and template context.
      operationId: sendSingleNotification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationRequest'
      responses:
        '202':
          description: Notification conditionally accepted for processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResponse'
        '400':
          description: Invalid request payload
        '500':
          description: Internal server error

  /notifications/batch:
    post:
      summary: Send multiple notifications
      description: Submit an array of notifications to be processed in a single batch.
      operationId: sendBatchNotifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/NotificationRequest'
      responses:
        '202':
          description: Batch accepted for processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchNotificationResponse'
        '400':
          description: Invalid request payload

components:
  schemas:
    Channel:
      type: string
      enum:
        - EMAIL
        - SMS
        - WHATSAPP
        - SIGNAL
        - BLUESKY
        - X
      description: The delivery medium for the given notification.
      
    NotificationRequest:
      type: object
      required:
        - channel
        - destination
        - templateId
      properties:
        channel:
          $ref: '#/components/schemas/Channel'
        destination:
          type: string
          description: The endpoint recipient (e.g., email address, phone number).
        source:
          type: string
          description: Originating service or user triggering the notification. Used for auditing.
        templateId:
          type: string
          description: Unique identifier of the message template to render.
        templatePayload:
          type: object
          description: Key-value map of dynamic properties injected into the template.
          additionalProperties: true

    NotificationResponse:
      type: object
      properties:
        notificationId:
          type: string
          format: uuid
          description: Unique identifier for tracking this specific notification's delivery state.
        status:
          type: string
          enum: [ACCEPTED, REJECTED]
          
    BatchNotificationResponse:
      type: object
      properties:
        batchId:
          type: string
          format: uuid
        acceptedCount:
          type: integer
        notifications:
          type: array
          items:
            $ref: '#/components/schemas/NotificationResponse'
